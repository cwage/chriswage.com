name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build
        run: bundle exec jekyll build --destination ./_site
        env:
          JEKYLL_ENV: production

      - name: HTML Proofer
        run: |
          bundle exec htmlproofer ./_site \
            --ignore-status-codes "999,429" \
            --no-enforce-https \
            --ignore-urls "/^https?:\/\/localhost/"
