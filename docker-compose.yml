services:
  jekyll:
    build: .
    ports:
      - "4000:4000"
      - "35729:35729" # livereload
    volumes:
      - .:/site
      - bundle_cache:/usr/local/bundle
    command: >
      bash -c "bundle install && bundle exec jekyll serve
      --host 0.0.0.0
      --livereload
      --force_polling"

volumes:
  bundle_cache:
